<style>

  *{margin:0;padding:0;box-sizing:border-box;}

    display:flex;justify-content:center;align-items:center;

  .panel{

    content:'';position:absolute;top:0;left:0;right:0;height:3px;

  }
  .panel-title{
    font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:3px;

<script>
// ═══════════════════════════════════════════════════
//  STORAGE KEYS
// // 👑 OWNER'S SECRET KEYS (From your screenshot)
const DREAMLO_PUBLIC_KEY  = "662b66788f413318f8469df5";
const DREAMLO_PRIVATE_KEY = "m_G-o6O_k0iId17W0I-uowIeXoYq_G9UunW7fH6Z6zLg"

// Personal (shared=false) — per device/user
const KEY_NAME = 'ss_name_v1';     // player's chosen name
const KEY_HS   = 'ss_hs_v1';      // player's personal best score
// Shared (shared=true) — global, all players see same data
const KEY_LB   = 'ss_lb_v5';      // full global leaderboard

const MAX_LB = 10000; // store up to 10,000 players globally

// ── Personal storage helpers — window.storage + localStorage fallback ──
// Dual-write means data saves even when window.storage is unavailable.
async function lbLoad() {
  const url = `https://www.dreamlo.com/lb/${DREAMLO_PUBLIC_KEY}/json`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.dreamlo.leaderboard && data.dreamlo.leaderboard.entry) {
      let entries = data.dreamlo.leaderboard.entry;
      return Array.isArray(entries) ? entries : [entries];
    }
  } catch (e) { console.log("Owner: Cloud bridge offline."); }
  return [];
}

async function lbSubmit(name, score, coins) {
  const url = `https://www.dreamlo.com/lb/${DREAMLO_PRIVATE_KEY}/add/${encodeURIComponent(name)}/${Math.floor(score)}/${coins}`;
  try {
    await fetch(url);
    return await lbLoad(); 
  } catch (e) { 
    console.log("Owner: Could not sync score.");
    return []; 
  }
}

}
async function lbSubmit(name,score,coins){
  let e=await lbLoad();
  const idx=e.findIndex(x=>x.name.toLowerCase()===name.toLowerCase());
  if(idx>=0){
    if(score>e[idx].score){
      e[idx].score=Math.floor(score);e[idx].coins=coins;e[idx].ts=Date.now();
    }
  } else {
    e.push({name,score:Math.floor(score),coins,ts:Date.now()});
  }
  e.sort((a,b)=>b.score-a.score);
  if(e.length>MAX_LB)e=e.slice(0,MAX_LB);
  await lbSave(e);
  return e;
}

// ── Formatting helpers ───────────────────────────────
function fmt(n){return Math.floor(n).toLocaleString();}
function fmtDate(ts){
  if(!ts)return'';
  const d=new Date(ts);
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return`${d.getDate()} ${mo} ${d.getFullYear()}`;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── Leaderboard renderer ─────────────────────────────
// Shows top 100 entries. If the current player is ranked > 100,
// shows a gap indicator then their entry pinned at bottom.
// Shows total player count at the top.
const SHOW_TOP = 100;
function renderLb(entries, me, container){
  if(!entries.length){
    container.innerHTML='<div class="lb-empty">No scores yet — be the first! 🏃</div>';
    return;
  }
  const medals=['🥇','🥈','🥉'];
  const total=entries.length;
  const meIdx=entries.findIndex(e=>e.name.toLowerCase()===(me||'').toLowerCase());

  function rowHTML(e,i,forceMe=false){
    const isMe=forceMe||e.name.toLowerCase()===(me||'').toLowerCase();
    const isBig=i>=100;
    const cls=`lb-row${i===0?' lb-top1':i===1?' lb-top2':i===2?' lb-top3':''}${isMe?' lb-me':''}`;
    return`<div class="${cls}">
      <span class="lb-rank${isBig?' big':''}">${(i+1).toLocaleString()}</span>
      <span class="lb-medal">${i<3?medals[i]:''}</span>
      <span class="lb-name">${esc(e.name)}${isMe?'<span style="color:#FFD700;font-size:.7rem;"> (you)</span>':''}</span>
      <div class="lb-right">
        <span class="lb-score">${fmt(e.score)}</span>
        <span class="lb-coins">🪙${e.coins}</span>
        <span class="lb-date">${e.ts?'📅 '+fmtDate(e.ts):''}</span>
      </div></div>`;
  }

  const topSlice=entries.slice(0,SHOW_TOP);
  let html=`<div class="lb-header">
    <span style="color:rgba(255,255,255,.35);font-size:.75rem;text-transform:uppercase;letter-spacing:.8px;">Rank</span>
    <span class="lb-total">👥 ${total.toLocaleString()} players</span>
  </div>`;

  html+=topSlice.map((e,i)=>rowHTML(e,i)).join('');

  // If player exists and is outside the top 100, pin their row at bottom
  if(meIdx>=SHOW_TOP){
    const hidden=meIdx-SHOW_TOP;
    html+=`<div class="lb-gap">··· ${hidden.toLocaleString()} more players ···</div>`;
    html+=rowHTML(entries[meIdx],meIdx,true);
  } else if(me&&meIdx<0){
    // Player has no score yet
    html+=`<div class="lb-gap" style="color:rgba(255,220,80,.35);">You haven't scored yet — play to appear here!</div>`;
  }

  container.innerHTML=html;
}

// ═══════════════════════════════════════════════════
//  OVERLAY / PANEL LOGIC
// ═══════════════════════════════════════════════════
const overlay   =document.getElementById('overlay');
const namePanel =document.getElementById('namePanel');
const menuPanel =document.getElementById('menuPanel');
const lbPanel   =document.getElementById('lbPanel');
const postPanel =document.getElementById('postPanel');
const nameInput =document.getElementById('nameInput');
const nameError =document.getElementById('nameError');
const initLoader=document.getElementById('initLoader');

function showPanel(p){
  [namePanel,menuPanel,lbPanel,postPanel].forEach(x=>x.style.display='none');
  overlay.style.display='flex';p.style.display='block';
}
function hideOverlay(){overlay.style.display='none';}

function showMainMenu(){
  document.getElementById('menuWelcome').innerHTML=
    `<div style="color:rgba(255,255,255,.45);font-size:.8rem;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;">Welcome back</div>
     <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#FFD700;letter-spacing:2px;">${esc(playerName)}</div>`;
  const hsEl=document.getElementById('menuHS');
  hsEl.innerHTML=highScore>0
    ?`<div style="color:rgba(255,255,255,.35);font-size:.78rem;letter-spacing:.8px;text-transform:uppercase;">Your best</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#FF8C00;">${fmt(highScore)}</div>`
    :'';
  showPanel(menuPanel);
}

// Bind name entry
document.getElementById('btnPlay').onclick=async()=>{
  const v=nameInput.value.trim();
  if(!v){nameError.textContent='Please enter your name!';return;}
  if(v.length<2){nameError.textContent='Name needs at least 2 characters.';return;}
  nameError.textContent='';
  playerName=v;
  await storSet(KEY_NAME,playerName);
  showMainMenu(); // go to menu, not straight into game
};
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btnPlay').click();});

document.getElementById('btnMenuPlay').onclick=()=>{hideOverlay();startGame();};

document.getElementById('btnShowLb').onclick=async()=>{
  showPanel(lbPanel);
  document.getElementById('lbList').innerHTML='<div class="lb-loading">Loading…</div>';
  const entries=await lbLoad();
  renderLb(entries,playerName,document.getElementById('lbList'));
};

document.getElementById('btnChangeName').onclick=async()=>{
  if(!confirm(`Change runner ID from "${playerName}"?\n\nYour score stays on the leaderboard under your old name.`))return;
  await storDel(KEY_NAME);
  playerName='';nameInput.value='';showPanel(namePanel);
};

document.getElementById('btnBackFromLb').onclick=()=>showMainMenu();
document.getElementById('btnPlayAgain').onclick=()=>{hideOverlay();startGame();};
document.getElementById('btnMainMenu').onclick=()=>showMainMenu();

async function showPostGame(sc,cn,isNew){
  showPanel(postPanel);
  const pt=document.getElementById('postTitle');
  pt.textContent=isNew?'★ NEW BEST! ★':'BUSTED!';
  pt.style.background=isNew?'linear-gradient(135deg,#FFE066,#FF8C00)':'linear-gradient(135deg,#FF4444,#FF8C00)';
  pt.style['-webkit-background-clip']='text';pt.style['-webkit-text-fill-color']='transparent';
  document.getElementById('postSub').textContent=`${playerName} · ${fmt(sc)} pts · 🪙 ${cn}`;
  document.getElementById('postStats').innerHTML='';
  document.getElementById('lbListPost').innerHTML='<div class="lb-loading">Saving your score…</div>';
  const entries=await lbSubmit(playerName,sc,cn);
  const rank=entries.findIndex(e=>e.name.toLowerCase()===playerName.toLowerCase())+1;
  document.getElementById('postStats').innerHTML=
    `<div style="color:#FFD700;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;">
      RANK #${rank.toLocaleString()} of ${entries.length.toLocaleString()}
     </div>`;
  renderLb(entries,playerName,document.getElementById('lbListPost'));
}

// ═══════════════════════════════════════════════════
//  GAME ENGINE
// ═══════════════════════════════════════════════════
const W=480,H=810,HORIZON_Y=240,NEAR_Y=H-80,FAR_HALF=34,NEAR_HALF=200,PLAYER_Z=0.84;
const rnd=(a,b)=>a+Math.random()*(b-a);
const rndInt=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));

function proj(wx,wz){
  const t=clamp(wz,0,1.5);
  const y=HORIZON_Y+(NEAR_Y-HORIZON_Y)*t;
  const hw=FAR_HALF+(NEAR_HALF-FAR_HALF)*t;
  const x=W/2+wx*hw/1.5;
  const scale=0.08+0.92*t;
  return{x,y,scale};
}

// ── AUDIO ────────────────────────────────────────────
let audioCtx=null;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function beep(freq,dur,type='sine',vol=0.18){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function sfxCoin(){beep(1046,0.07);}
function sfxJump(){beep(440,0.1,'square',0.09);}
function sfxSlide(){beep(220,0.12,'triangle',0.09);}
function sfxDie(){beep(220,0.25,'sawtooth',0.18);setTimeout(()=>beep(140,0.4,'sawtooth',0.18),220);}
function sfxStart(){beep(660,0.07);setTimeout(()=>beep(880,0.1),90);}
function sfxPower(){beep(880,0.06);setTimeout(()=>beep(1100,0.08),70);setTimeout(()=>beep(1320,0.1),150);}

// ── BUILDINGS ────────────────────────────────────────
const BC=['#c0392b','#2980b9','#27ae60','#d35400','#8e44ad','#16a085','#2c3e50','#7f8c8d'];
function makeBuildings(){
  const mk=()=>{const arr=[];for(let i=0;i<14;i++){
    const bW=rnd(45,90),bH=rnd(90,260),x=i*85,color=BC[rndInt(0,BC.length-1)],wins=[];
    const cols=Math.floor(bW/18),rows=Math.floor(bH/22);
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(Math.random()>0.35)wins.push({c,r});
    arr.push({x,bW,bH,color,wins});}return arr;};
  return{left:mk(),right:mk()};
}
let BLDGS=makeBuildings(),bldgScroll=0;
const BLDG_TOTAL=14*85;

// ── CANVAS ───────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
function resize(){
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  canvas.width=W;canvas.height=H;
  canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';
}
window.addEventListener('resize',resize);resize();

// ── RUNTIME STATE ────────────────────────────────────
let STATE='waiting',score=0,coins=0,speed=0.012,frame=0;
let obstTimer=0,coinTimer=0,powerTimer=0,gameTimeMs=0,lastTS=0,trackScroll=0;
// These are loaded from storage in init():
let playerName='';
let highScore=0;

const P={lane:0,targetLane:0,lx:0,z:PLAYER_Z,jv:0,height:0,jumping:false,sliding:false,slideT:0,af:0,inv:0};
let obstacles=[],coinObjs=[],particles=[],powerups=[],activePower=null;

// ── POWER-UP DEFS (4 powerups) ───────────────────────
const POWERS=[
  {type:'magnet',  color:'#e040fb', label:'🧲 MAGNET',   duration:300},
  {type:'shield',  color:'#29b6f6', label:'🛡 SHIELD',    duration:260},
  {type:'jetpack', color:'#66bb6a', label:'🚀 JETPACK',   duration:220},
  {type:'x2score', color:'#ff4081', label:'⚡ 2X SCORE',  duration:280},
];

// ── SPEED — original ramp ──────────────────────────────
// 0s→0.012  30s→0.028  60s→0.044  90s→0.060 (cap)
const SPEED_START=0.012, SPEED_MAX=0.060, SPEED_RATE=0.00053;
function computeSpeed(ms){return Math.min(SPEED_MAX,SPEED_START+(ms/1000)*SPEED_RATE);}
function speedLevel(spd){return Math.min(10,Math.ceil((spd-SPEED_START)/((SPEED_MAX-SPEED_START)/10))+1);}

// ── SPAWNING ─────────────────────────────────────────
const TC=['#e74c3c','#e67e22','#3498db','#2ecc71','#9b59b6','#1abc9c'];
function spawnObstacle(){
  const r=Math.random();let type,lane,span;
  if(r<0.45){type='train';if(Math.random()<0.28){lane=rndInt(-1,0);span=2;}else{lane=rndInt(-1,1);span=1;}}
  else if(r<0.75){type='barrier';lane=rndInt(-1,1);span=1;}
  else{type='lowBar';lane=rndInt(-1,1);span=1;}
  obstacles.push({type,lane,span,z:0,color:TC[rndInt(0,TC.length-1)],dead:false});
}
function spawnCoins(){
  const lane=rndInt(-1,1),pat=rndInt(0,2);
  for(let i=0;i<6;i++){
    let cl=lane;
    if(pat===1)cl=rndInt(-1,1);
    if(pat===2)cl=[-1,0,1][i%3];
    coinObjs.push({lane:cl,z:-i*0.065,col:false});
  }
}
function spawnPowerup(){
  const def=POWERS[rndInt(0,POWERS.length-1)];
  powerups.push({...def,lane:rndInt(-1,1),z:0,dead:false});
}

function drawBG(){
  const sky=ctx.createLinearGradient(0,0,0,HORIZON_Y+40);
  sky.addColorStop(0,'#07071a');sky.addColorStop(0.4,'#180f45');
  sky.addColorStop(0.8,'#b03014');sky.addColorStop(1,'#de7130');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,HORIZON_Y+40);
  ctx.fillStyle='rgba(255,255,255,0.75)';
  for(const[sx,sy]of[[40,30],[90,15],[170,42],[260,20],[330,10],[400,36],[450,22],[200,8],[120,55],[310,50]]){
    ctx.beginPath();ctx.arc(sx,sy,1.2,0,Math.PI*2);ctx.fill();
  }
  const sg=ctx.createRadialGradient(W*.72,68,0,W*.72,68,38);
  sg.addColorStop(0,'#ffe066');sg.addColorStop(0.6,'#ff9800');sg.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(W*.72,68,38,0,Math.PI*2);ctx.fill();
  const bx0=-(bldgScroll%BLDG_TOTAL);
  for(let pass=0;pass<2;pass++){
    const side=pass===0?BLDGS.left:BLDGS.right,mirror=pass===1;
    for(const b of side){
      let bx=bx0+b.x;if(bx>(mirror?W:W/2))bx-=BLDG_TOTAL;
      const rx=mirror?W-bx-b.bW:bx,ry=HORIZON_Y+40-b.bH;
      ctx.fillStyle='#08080f';ctx.fillRect(rx,ry,b.bW,b.bH);
      ctx.fillStyle='rgba(255,240,100,0.5)';
      for(const w of b.wins){const wx=rx+3+w.c*18,wy=ry+4+w.r*22;if(wy<HORIZON_Y+38)ctx.fillRect(wx,wy,9,12);}
    }
  }
}

// Track with scrolling sleepers — no optical illusion
function drawTrack(){
  const g=ctx.createLinearGradient(0,HORIZON_Y,0,H);
  g.addColorStop(0,'#2a2a2a');g.addColorStop(0.5,'#1a1a1a');g.addColorStop(1,'#0f0f0f');
  ctx.beginPath();
  ctx.moveTo(W/2-FAR_HALF-18,HORIZON_Y);ctx.lineTo(W/2+FAR_HALF+18,HORIZON_Y);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();ctx.moveTo(0,HORIZON_Y);ctx.lineTo(W/2-FAR_HALF-18,HORIZON_Y);ctx.lineTo(0,H);
  ctx.fillStyle='#0e0e0e';ctx.fill();
  ctx.beginPath();ctx.moveTo(W,HORIZON_Y);ctx.lineTo(W/2+FAR_HALF+18,HORIZON_Y);ctx.lineTo(W,H);
  ctx.fillStyle='#0e0e0e';ctx.fill();

  // Scrolling railway sleepers — animated at game speed
  const SPACING=0.10;
  const phase=trackScroll%SPACING;
  for(let i=0;i<14;i++){
    const z=0.04+i*SPACING-phase;
    if(z<0.03||z>1.08)continue;
    const pL=proj(-1.55,z),pR=proj(1.55,z);
    const alpha=clamp(z*1.8,0,0.65);
    ctx.beginPath();ctx.moveTo(pL.x,pL.y);ctx.lineTo(pR.x,pR.y);
    ctx.strokeStyle=`rgba(75,55,30,${alpha})`;
    ctx.lineWidth=Math.max(1.5,6*z);ctx.stroke();
  }

  // Static rails
  for(const rx of[-1.35,-0.55,0.55,1.35]){
    const pN=proj(rx,1.0),pF=proj(rx,0.05);
    const rg=ctx.createLinearGradient(pF.x,pF.y,pN.x,pN.y);
    rg.addColorStop(0,'#3a3a3a');rg.addColorStop(1,'#888');
    ctx.beginPath();ctx.moveTo(pF.x,pF.y);ctx.lineTo(pN.x,pN.y);
    ctx.strokeStyle=rg;ctx.lineWidth=3;ctx.stroke();
  }
  ctx.setLineDash([10,22]);
  for(const lx of[-0.5,0.5]){
    const pN=proj(lx,0.96),pF=proj(lx,0.07);
    ctx.beginPath();ctx.moveTo(pF.x,pF.y);ctx.lineTo(pN.x,pN.y);
    ctx.strokeStyle='rgba(255,220,0,0.15)';ctx.lineWidth=1.5;ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawObstacles(){
  const sorted=obstacles.filter(o=>!o.dead).sort((a,b)=>a.z-b.z);
  for(const o of sorted){
    const cx=o.lane+(o.span-1)*0.5,p=proj(cx,o.z);
    if(o.type==='train')drawTrain(o,p);
    else if(o.type==='barrier')drawBarrier(o,p);
    else drawLowBar(o,p);
  }
}
function drawTrain(o,p){
  const s=p.scale,tW=118*s*o.span,tH=175*s,x=p.x-tW/2,y=p.y-tH;
  ctx.fillStyle=o.color;ctx.fillRect(x,y,tW,tH);
  const rG=ctx.createLinearGradient(x,y,x,y+28*s);
  rG.addColorStop(0,'rgba(0,0,0,.5)');rG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=rG;ctx.fillRect(x,y,tW,28*s);
  const wW=Math.max(6,24*s*o.span),wH=Math.max(4,16*s),cols=o.span*2+1;
  for(let row=0;row<3;row++)for(let col=0;col<cols;col++){
    const wx=x+6*s+col*(tW-12*s)/cols,wy=y+32*s+row*40*s;
    ctx.fillStyle=row===0?'#b0d8f8':'#87ceeb';ctx.fillRect(wx,wy,wW*.85,wH);
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.fillRect(wx,wy,wW*.3,wH*.5);
  }
  const stripe=['#FFD700','#FF69B4','#00FFAA','#FF4500'];
  for(let i=0;i<o.span*4;i++){ctx.fillStyle=stripe[i%stripe.length];ctx.fillRect(x+i*tW/(o.span*4),y+tH-42*s,tW/(o.span*4+1)+2,14*s);}
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(x,y+tH-10*s,tW,10*s);
  ctx.fillStyle='#fff';ctx.fillRect(x+tW/2-18*s,y+5*s,36*s,18*s);
  ctx.fillStyle='#000';ctx.font=`bold ${Math.max(8,11*s)}px Arial`;
  ctx.textAlign='center';ctx.fillText('SURFERS',p.x,y+17*s);
  ctx.strokeStyle='rgba(0,0,0,.7)';ctx.lineWidth=2*s;ctx.strokeRect(x,y,tW,tH);
}
function drawBarrier(o,p){
  const s=p.scale,x=p.x,y=p.y;
  ctx.fillStyle='#FF6600';ctx.fillRect(x-4*s,y-95*s,8*s,95*s);
  ctx.fillRect(x-4*s,y-90*s,80*s,12*s);
  const sc=['#FF6600','#000'];
  for(let i=0;i<5;i++){ctx.fillStyle=sc[i%2];ctx.fillRect(x-4*s+i*16*s,y-90*s,16*s,12*s);}
  ctx.save();ctx.translate(x+50*s,y-84*s);ctx.rotate(Math.PI/4);
  ctx.fillStyle='#FFD700';ctx.fillRect(-10*s,-10*s,20*s,20*s);ctx.restore();
  ctx.fillStyle='#c00';ctx.font=`bold ${Math.max(8,12*s)}px Arial`;ctx.textAlign='center';
  ctx.fillText('!',x+50*s,y-80*s);
  ctx.fillStyle='#555';ctx.fillRect(x-12*s,y-8*s,24*s,8*s);
}
function drawLowBar(o,p){
  const s=p.scale,x=p.x,y=p.y,bW=90*s,bH=30*s;
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(x-bW/2+3,y-bH+3,bW,bH);
  ctx.fillStyle='#CC2200';ctx.fillRect(x-bW/2,y-bH,bW,bH);
  for(let i=0;i<5;i++){ctx.fillStyle=i%2===0?'#FFD700':'#CC2200';ctx.fillRect(x-bW/2+i*bW/5,y-bH,bW/5,bH);}
  ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.strokeRect(x-bW/2,y-bH,bW,bH);
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(7,10*s)}px Arial`;ctx.textAlign='center';
  ctx.fillText('SLIDE',x,y-bH/2+4*s);
}
function drawPowerups(){
  for(const pw of powerups){
    if(pw.dead)continue;
    const p=proj(pw.lane,pw.z),r=Math.max(5,17*p.scale),cy=p.y-r;
    const glow=ctx.createRadialGradient(p.x,cy,0,p.x,cy,r*1.5);
    glow.addColorStop(0,pw.color+'ff');glow.addColorStop(0.5,pw.color+'88');glow.addColorStop(1,pw.color+'00');
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(p.x,cy,r*1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=pw.color;ctx.beginPath();ctx.arc(p.x,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.95)';ctx.font=`${Math.max(9,r)}px Arial`;
    ctx.textAlign='center';ctx.fillText(pw.label.split(' ')[0],p.x,cy+r*.4);
  }
}
function drawCoins(){
  for(const c of coinObjs){
    if(c.col||c.z<=0.04)continue;
    const p=proj(c.lane,c.z),r=Math.max(4,13*p.scale),cy=p.y-r;
    const cg=ctx.createRadialGradient(p.x-r*.3,cy-r*.3,r*.05,p.x,cy,r);
    cg.addColorStop(0,'#FFF0A0');cg.addColorStop(.5,'#FFD700');cg.addColorStop(1,'#B8860B');
    ctx.beginPath();ctx.arc(p.x,cy,r,0,Math.PI*2);ctx.fillStyle=cg;ctx.fill();
    ctx.fillStyle='#7a5200';ctx.font=`bold ${Math.max(6,r*1.1)}px Arial`;
    ctx.textAlign='center';ctx.fillText('$',p.x,cy+r*.38);
    ctx.beginPath();ctx.arc(p.x-r*.3,cy-r*.25,r*.22,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.fill();
  }
}
function drawPlayer(){
  const p=proj(P.lx,P.z),s=p.scale,cx=p.x,groundY=p.y;
  const lift=(activePower?.type==='jetpack')?0.48:P.height;
  const cy=groundY-lift*s*90;
  const sh=1-lift*.6;
  ctx.beginPath();ctx.ellipse(cx,groundY,22*s*sh,7*s*sh,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.45)';ctx.fill();
  if(activePower?.type==='jetpack'){
    for(let i=-1;i<=1;i++){
      const fx=cx+i*10*s,fy=cy+32*s;
      const fg=ctx.createRadialGradient(fx,fy,0,fx,fy,13*s);
      fg.addColorStop(0,'#fff');fg.addColorStop(.3,'#ffaa00');fg.addColorStop(1,'rgba(255,50,0,0)');
      ctx.fillStyle=fg;ctx.beginPath();ctx.arc(fx,fy,13*s,0,Math.PI*2);ctx.fill();
    }
  }
  if(activePower?.type==='x2score'){
    const t=frame*.18;
    ctx.beginPath();ctx.arc(cx,cy-30*s,46*s+Math.sin(t)*4*s,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,64,129,${0.5+Math.sin(t)*.3})`;ctx.lineWidth=5*s;ctx.stroke();
  }
  if(P.sliding)drawSliding(cx,cy,s,groundY);else drawRunning(cx,cy,s);
  if(activePower?.type==='shield'){
    ctx.beginPath();ctx.arc(cx,cy-30*s,48*s,0,Math.PI*2);
    ctx.strokeStyle='rgba(41,182,246,.75)';ctx.lineWidth=4*s;ctx.stroke();
    ctx.fillStyle='rgba(41,182,246,.1)';ctx.fill();
  }
  if(P.inv>0&&Math.floor(frame/4)%2===0){
    ctx.beginPath();ctx.arc(cx,cy-30*s,42*s,0,Math.PI*2);
    ctx.strokeStyle='rgba(100,200,255,.6)';ctx.lineWidth=4*s;ctx.stroke();
  }
}
function drawRunning(cx,cy,s){
  const la=Math.sin(P.af*.28)*18*s;
  ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-5*s,cy-8*s);ctx.lineTo(cx-9*s,cy+la);
  ctx.strokeStyle='#1565C0';ctx.lineWidth=9*s;ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+5*s,cy-8*s);ctx.lineTo(cx+9*s,cy-la);
  ctx.strokeStyle='#1565C0';ctx.lineWidth=9*s;ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx-9*s,cy+la,11*s,5*s,-.2,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx+9*s,cy-la,11*s,5*s,.2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.fillStyle='#D32F2F';roundFill(cx-15*s,cy-52*s,30*s,48*s,6*s);
  ctx.fillStyle='#fff';ctx.fillRect(cx-3*s,cy-52*s,6*s,48*s);
  ctx.fillStyle='#B71C1C';ctx.beginPath();ctx.arc(cx,cy-52*s,12*s,Math.PI,0);ctx.fill();
  const aa=Math.cos(P.af*.28)*14*s;
  ctx.beginPath();ctx.moveTo(cx-15*s,cy-42*s);ctx.lineTo(cx-24*s,cy-24*s+aa);
  ctx.strokeStyle='#D32F2F';ctx.lineWidth=8*s;ctx.stroke();
  ctx.beginPath();ctx.arc(cx-24*s,cy-24*s+aa,5*s,0,Math.PI*2);ctx.fillStyle='#FFCA80';ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+15*s,cy-42*s);ctx.lineTo(cx+24*s,cy-24*s-aa);
  ctx.strokeStyle='#D32F2F';ctx.lineWidth=8*s;ctx.stroke();
  ctx.beginPath();ctx.arc(cx+24*s,cy-24*s-aa,5*s,0,Math.PI*2);ctx.fillStyle='#FFCA80';ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy-67*s,17*s,0,Math.PI*2);ctx.fillStyle='#FFCA80';ctx.fill();
  ctx.fillStyle='#E65100';ctx.beginPath();ctx.arc(cx,cy-78*s,15*s,Math.PI,0);ctx.fill();
  ctx.fillRect(cx-15*s,cy-78*s,30*s,10*s);
  ctx.fillStyle='#BF360C';roundFill(cx-20*s,cy-70*s,40*s,6*s,2*s);
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(cx-5*s,cy-67*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+5*s,cy-67*s,3*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(cx-4*s,cy-68*s,1*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+6*s,cy-68*s,1*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy-62*s,5*s,.1,Math.PI-.1);
  ctx.strokeStyle='#8B4513';ctx.lineWidth=2*s;ctx.stroke();
}
function drawSliding(cx,cy,s,groundY){
  const sy=groundY-16*s;
  ctx.fillStyle='#D32F2F';roundFill(cx-32*s,sy-14*s,52*s,22*s,8*s);
  ctx.fillStyle='#fff';ctx.fillRect(cx-32*s,sy-8*s,52*s,6*s);
  ctx.beginPath();ctx.arc(cx+34*s,sy-5*s,15*s,0,Math.PI*2);ctx.fillStyle='#FFCA80';ctx.fill();
  ctx.fillStyle='#E65100';ctx.beginPath();ctx.arc(cx+34*s,sy-14*s,13*s,Math.PI,0);ctx.fill();
  ctx.fillRect(cx+21*s,sy-14*s,26*s,8*s);roundFill(cx+17*s,sy-7*s,34*s,5*s,2*s);
  ctx.fillStyle='#222';
  ctx.beginPath();ctx.arc(cx+30*s,sy-5*s,2.5*s,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx+39*s,sy-5*s,2.5*s,0,Math.PI*2);ctx.fill();
  ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(cx-32*s,sy-4*s);ctx.lineTo(cx-58*s,sy-3*s);
  ctx.strokeStyle='#1565C0';ctx.lineWidth=9*s;ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-32*s,sy+4*s);ctx.lineTo(cx-55*s,sy+8*s);
  ctx.strokeStyle='#1565C0';ctx.lineWidth=9*s;ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx-59*s,sy-2*s,11*s,5*s,-.1,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.beginPath();ctx.ellipse(cx-57*s,sy+9*s,11*s,5*s,.1,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}
function roundFill(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();ctx.fill();
}
function drawParticles(){
  for(const pt of particles){ctx.globalAlpha=clamp(pt.a,0,1);ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r,0,Math.PI*2);ctx.fillStyle=pt.color;ctx.fill();}
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════
function updatePlayer(){
  P.lx+=(P.targetLane-P.lx)*.18;
  if(activePower?.type==='jetpack'){P.jumping=false;P.height=0;}
  else if(P.jumping){
    P.height+=P.jv*.016;P.jv-=22;
    if(P.height<=0){P.height=0;P.jumping=false;P.jv=0;}
  }
  if(P.sliding){P.slideT--;if(P.slideT<=0)P.sliding=false;}
  P.af++;if(P.inv>0)P.inv--;
}
function updateObstacles(){
  for(const o of obstacles){o.z+=speed;if(o.z>1.15)o.dead=true;}
  obstacles=obstacles.filter(o=>!o.dead);
}
function updateCoins(){
  for(const c of coinObjs)c.z+=speed;
  coinObjs=coinObjs.filter(c=>c.z<1.2);
  const mag=activePower?.type==='magnet';
  const mult=activePower?.type==='x2score'?2:1;
  for(const c of coinObjs){
    if(c.col||c.z<0.05)continue;
    if(Math.abs(c.z-P.z)<(mag?.14:.045)&&Math.abs(c.lane-P.lx)<(mag?1.6:.55)){
      c.col=true;coins++;score+=10*mult;sfxCoin();
      const pp=proj(c.lane,c.z);
      for(let i=0;i<6;i++)particles.push({x:pp.x,y:pp.y-10,vx:rnd(-3,3),vy:rnd(-4,-1),r:rnd(3,6),color:'#FFD700',a:1});
    }
  }
}
function updatePowerups(){
  for(const pw of powerups){pw.z+=speed;if(pw.z>1.15)pw.dead=true;}
  powerups=powerups.filter(pw=>!pw.dead);
  for(const pw of powerups){
    if(pw.dead||pw.z<0.05)continue;
    if(Math.abs(pw.z-P.z)<0.065&&Math.abs(pw.lane-P.lx)<0.65){
      pw.dead=true;activePower={...pw,timeLeft:pw.duration};sfxPower();
      const pp=proj(pw.lane,pw.z);
      for(let i=0;i<12;i++)particles.push({x:pp.x,y:pp.y-20,vx:rnd(-5,5),vy:rnd(-6,-1),r:rnd(4,9),color:pw.color,a:1});
    }
  }
  if(activePower){activePower.timeLeft--;if(activePower.timeLeft<=0)activePower=null;}
}
function updateParticles(){
  for(const pt of particles){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.12;pt.a-=.04;}
  particles=particles.filter(pt=>pt.a>0);
}
function checkCollisions(){
  if(P.inv>0||activePower?.type==='shield')return;
  for(const o of obstacles){
    if(o.dead)continue;
    if(Math.abs(o.z-P.z)>.07)continue;
    const oL=o.lane-.45,oR=o.lane+o.span-1+.45;
    if(P.lx<oL||P.lx>oR)continue;
    const lh=(activePower?.type==='jetpack')?.48:P.height;
    let hit=false;
    if(o.type==='lowBar')hit=!P.sliding;
    else if(o.type==='barrier')hit=!P.sliding&&lh<.32;
    else hit=lh<.55;
    if(hit){die();return;}
  }
}
function die(){
  if(STATE!=='playing')return;
  STATE='dead';sfxDie();activePower=null;
  const isNew=score>highScore;
  if(isNew){
    highScore=score;
    storSet(KEY_HS,Math.floor(score)); // persist personal best
  }
  const pp=proj(P.lx,P.z);
  for(let i=0;i<24;i++)particles.push({
    x:pp.x,y:pp.y-40,vx:rnd(-7,7),vy:rnd(-8,2),r:rnd(4,10),
    color:['#FF0000','#FF6B00','#FFD700','#fff'][rndInt(0,3)],a:1
  });
  setTimeout(()=>showPostGame(score,coins,isNew),900);
}
function handleSpawning(){
  const gap=Math.max(42,125-speed*2200);
  obstTimer++;if(obstTimer>=gap){spawnObstacle();obstTimer=0;}
  coinTimer++;if(coinTimer>=34){spawnCoins();coinTimer=0;}
  powerTimer++;
  const pwGap=Math.max(260,520-score/75);
  if(powerTimer>=pwGap){spawnPowerup();powerTimer=0;}
}

// ── INPUT ─────────────────────────────────────────────
let keys={};
document.addEventListener('keydown',e=>{
  if(keys[e.code])return;keys[e.code]=true;ensureAudio();
  if(STATE!=='playing')return;
  if(e.code==='ArrowLeft'||e.code==='KeyA')moveLeft();
  if(e.code==='ArrowRight'||e.code==='KeyD')moveRight();
  if(e.code==='ArrowUp'||e.code==='KeyW')jump();
  if(e.code==='ArrowDown'||e.code==='KeyS')doSlide();
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
let tx0,ty0;
canvas.addEventListener('touchstart',e=>{e.preventDefault();ensureAudio();tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();if(STATE!=='playing')return;
  const dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)>Math.abs(dy)){if(dx<-20)moveLeft();else if(dx>20)moveRight();}
  else{if(dy<-20)jump();else if(dy>20)doSlide();}
},{passive:false});
function moveLeft(){if(P.targetLane>-1)P.targetLane--;}
function moveRight(){if(P.targetLane<1)P.targetLane++;}
function jump(){
  if(activePower?.type==='jetpack')return;
  if(!P.jumping){P.jumping=true;P.jv=17;P.sliding=false;sfxJump();}
  else if(P.jv>0)P.jv=-8;
}
function doSlide(){
  if(activePower?.type==='jetpack')return;
  if(!P.jumping){P.sliding=true;P.slideT=45;sfxSlide();}
  else P.jv=Math.min(P.jv,-10);
}

// ── GAME START ────────────────────────────────────────
function startGame(){
  score=0;coins=0;speed=SPEED_START;frame=0;gameTimeMs=0;lastTS=0;trackScroll=0;
  obstTimer=rndInt(20,50);coinTimer=rndInt(0,30);powerTimer=rndInt(80,200);
  obstacles=[];coinObjs=[];particles=[];powerups=[];activePower=null;
  P.lane=0;P.targetLane=0;P.lx=0;P.jv=0;P.height=0;P.jumping=false;
  P.sliding=false;P.slideT=0;P.af=0;P.inv=0;
  BLDGS=makeBuildings();STATE='playing';sfxStart();
}

// ── GAME LOOP ─────────────────────────────────────────
function loop(ts){
  if(STATE==='playing'){
    if(lastTS)gameTimeMs+=(ts-lastTS);
    lastTS=ts;
    speed=computeSpeed(gameTimeMs);
  }else{lastTS=0;}

  ctx.clearRect(0,0,W,H);
  drawBG();drawTrack();

  if(STATE==='playing'){
    frame++;bldgScroll+=speed*65;trackScroll+=speed;
    const mult=activePower?.type==='x2score'?2:1;
    score+=speed*88*mult;
    handleSpawning();updatePlayer();updateObstacles();
    updateCoins();updatePowerups();updateParticles();checkCollisions();
  }else if(STATE==='dead'||STATE==='waiting'){
    updateParticles();bldgScroll+=.55;trackScroll+=SPEED_START;
  }

  drawPowerups();drawCoins();drawObstacles();drawParticles();
  if(STATE==='playing'){drawPlayer();drawHUD();}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ═══════════════════════════════════════════════════
//  ASYNC STARTUP — loads name + HS from window.storage
//  before showing anything to the user.
// ═══════════════════════════════════════════════════
async function init(){
  // Read persistent name and high score from storage
  const savedName = await storGet(KEY_NAME);
  const savedHS   = await storGet(KEY_HS);
  if(savedHS) highScore = parseInt(savedHS)||0;

  // Hide the full-screen loader now that storage is ready
  initLoader.style.display='none';

  if(savedName && savedName.trim().length>=2){
    playerName=savedName.trim();
    showMainMenu();       // go straight to menu — no name prompt
  } else {
    showPanel(namePanel); // first time — ask for name
  }
}
init();
</script>
